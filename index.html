<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hercules Golf</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#ffffff;
    color:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
    max-width:700px;
    padding:40px;
}

img{
    width:420px;
    max-width:90%;
}

p{
    margin-top:25px;
    font-size:17px;
    letter-spacing:.08em;
    font-weight:600;
    transform: translateX(6px);
}

.links{
    margin-top:50px;
}

.links{
    margin-top:50px;
    display:grid;
    grid-template-columns:repeat(2, auto);
    gap:18px 40px;
    justify-content:center;
}

.links a:hover{
    color:#000;
}

.links a{
    text-decoration:none;
    color:#666;
    font-size:15px;
}

@media (max-width: 600px) {

    p{
        font-size:18px;
    }

</style>

</head>

<body>

<div class="container">

<img src="Hercules_logo.png" alt="Hercules Golf">

<div class="links">
